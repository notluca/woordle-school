<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:ital,wght@0,400..700;1,400..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/docent.css">
    <title>Woordle</title>
</head>
<body>
    <div class="woordle-logo">
        <span class="woordle-green">doce</span><span class="woordle-yellow">nten</span><span class="woordle-white">paneel</span>
    </div>
    <div class="blocks-wrapper">
        <div class="block">
            <div class="block-content">
                <button class="main-btn">Klas aanmaken</button>
                <select class="select-dropdown">
                    <option selected disabled>Klas selecteren</option>
                    <option>1A</option>
                    <option>1B</option>
                    <option>2A</option>
                    <option>2B</option>
                </select>
                <button class="main-btn">Woord bedenken</button>
                <input class="word-input" type="text" maxlength="5" placeholder="Woord 1 (5 letters)">
                <input class="word-input" type="text" maxlength="5" placeholder="Woord 2 (5 letters)">
                <input class="word-input" type="text" maxlength="5" placeholder="Woord 3 (5 letters)">
                <input class="word-input" type="text" maxlength="5" placeholder="Woord 4 (5 letters)">
                <input class="word-input" type="text" maxlength="5" placeholder="Woord 5 (5 letters)">
                <button class="main-btn">opslaan</button>
            </div>
        </div>
        <div class="block">
            <div class="block-content block-content-right">
                <div class="code-box">voorbeeldcode</div>
                <button class="main-btn create-btn">code aanmaken</button>
            </div>
        </div>
    </div>
</body>
</html>
