<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="/css/style.css">
    <script src="/js/script.js" defer></script>
</head>
<body>
    <h1>Leaderboard</h1>
    <div class="leaderboard-wrapper">
        <div class="leaderboard">
            <div class="tabs">
                <button class="leaderboard-button">Weekelijk</button>
                <button class="leaderboard-button">Maandelijk</button>
                <button class="leaderboard-button">Alle Tijden</button>
                <button class="leaderboard-button">Streaks</button>
            </div>

            <div class="list-panel">
                <div class="list-header">
                    <div class="col username">Username</div>
                    <div class="col score">Score</div>
                </div>

                <div class="list-body">
                    <div class="list-row">
                        <div class="col username">user1</div>
                        <div class="col score">189</div>
                    </div>
                    <div class="list-row">
                        <div class="col username">user2</div>
                        <div class="col score">173</div>
                    </div>
                    <div class="list-row">
                        <div class="col username">user3</div>
                        <div class="col score">160</div>
                    </div>
                    <div class="list-row">
                        <div class="col username">user4</div>
                        <div class="col score">149</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
